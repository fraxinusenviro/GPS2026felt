# Production Cloudflare Worker for the Fraxinus Field Mapper backend.
# Replaces the throwaway cloud-spike/. Auth is Cloudflare Access (JWT verified
# against the team JWKS) instead of the spike's placeholder bearer token.

name = "ffm-backend"
main = "src/index.ts"
compatibility_date = "2025-06-01"

# Object storage for de-inlined photos/blobs. S3-compatible, zero egress.
[[r2_buckets]]
binding = "BLOBS"
bucket_name = "ffm-blobs"

# SQLite at the edge: one row per synced entity, with a global `rev` sequence
# driving the /changes cursor. Schema lives in ./schema as numbered migrations.
[[d1_databases]]
binding = "DB"
database_name = "ffm"
database_id = "REPLACE_WITH_D1_DATABASE_ID"   # from `wrangler d1 create ffm`
migrations_dir = "schema"

[vars]
# Cloudflare Access config. When BOTH TEAM_DOMAIN and ACCESS_AUD are set the
# Worker enforces Access (JWT verified against the team JWKS); leaving them blank
# is DEV MODE only. See ACCESS.md for the full setup runbook.
TEAM_DOMAIN = "https://fraxinusenviro.cloudflareaccess.com"
ACCESS_AUD = ""         # paste the AUD tag after creating the Access application (ACCESS.md step 3)

# CORS: the PWA origin allowed to call this backend with credentials. Required
# because the PWA is hosted on a SEPARATE origin from this Worker (cross-origin).
# Set to the exact PWA origin, e.g. https://fieldmapper.pages.dev — no trailing slash.
ALLOWED_ORIGIN = ""     # set to the PWA origin (ACCESS.md step 4)

# R2 S3 presigned-URL config (secrets R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY
# go via `wrangler secret put`). R2_ACCOUNT_ID is your Cloudflare account id.
R2_ACCOUNT_ID = ""
R2_BUCKET_NAME = "ffm-blobs"
