# Production Cloudflare Worker for the Fraxinus Field Mapper.
# Serves BOTH the PWA (Workers Static Assets, from ../dist) and the sync/blob API
# from one origin, so the Access cookie is first-party and there is no CORS.
# Auth is Cloudflare Access (JWT verified against the team JWKS). See ACCESS.md.

name = "fieldmapper"
main = "src/index.ts"
compatibility_date = "2025-06-01"

# Static PWA assets (built by `npm run build` at the repo root → ../dist). The
# Worker runs first (run_worker_first) so API paths hit our code; everything else
# is delegated to env.ASSETS, with SPA fallback to index.html.
[assets]
directory = "../dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

# Object storage for de-inlined photos/blobs. S3-compatible, zero egress.
[[r2_buckets]]
binding = "BLOBS"
bucket_name = "ffm-blobs"

# SQLite at the edge: one row per synced entity, with a global `rev` sequence
# driving the /changes cursor. Schema lives in ./schema as numbered migrations.
[[d1_databases]]
binding = "DB"
database_name = "ffm"
database_id = "0a87fcf2-acb9-4ccd-80cd-faeb816d8835"   # from `wrangler d1 create ffm`
migrations_dir = "schema"

[vars]
# Cloudflare Access config. When BOTH TEAM_DOMAIN and ACCESS_AUD are set the
# Worker enforces Access (JWT verified against the team JWKS); leaving either
# blank is DEV MODE (no enforcement). See ACCESS.md.
TEAM_DOMAIN = "https://fraxinusenviro.cloudflareaccess.com"
ACCESS_AUD = "4b471a9ec9308413b060ed3377fa1656f4b433aafdc022ddb3da4a11dce961a4"

# CORS is NOT needed in the single-origin setup (PWA + API share this Worker).
# Only set this if a separate-origin client must call the API cross-origin.
ALLOWED_ORIGIN = ""

# R2 S3 presigned-URL config (secrets R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY
# go via `wrangler secret put`). R2_ACCOUNT_ID is your Cloudflare account id.
R2_ACCOUNT_ID = "1edcb67fc582d37374725ed3bd8dc91a"
R2_BUCKET_NAME = "ffm-blobs"
