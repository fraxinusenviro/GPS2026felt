<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a3a2a" />
  <meta name="description" content="Offline-first GPS Data Collector for Environmental Fieldwork" />
  <!-- PWA / iOS -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FieldMapper" />
  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
  <link rel="manifest" href="./manifest.json" />
  <title>FIELD MAPPER - GPS data collector &amp; GIS tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <!-- Top Header Bar -->
    <header id="header">
      <div id="header-left">
        <button id="btn-settings" class="icon-btn" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div id="branding">
          <img src="/logo.png" id="brand-logo" alt="Fraxinus" />
        </div>
        <div id="session-id"><span class="app-name">Field Mapper</span><span id="session-label"></span></div>
        <button id="btn-project" class="icon-btn header-project-btn" title="Projects">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-8l-2-2z" opacity="0.85"/>
          </svg>
          <span>Projects</span>
        </button>
      </div>
      <div id="header-right">
        <div id="hud-coords">
          <div id="hud-latlon">---, ---</div>
          <div id="hud-utm">---</div>
        </div>
        <div id="gps-badge" class="gps-badge gps-unknown" title="GPS Accuracy">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M232,120h-8.34A96.14,96.14,0,0,0,136,32.34V24a8,8,0,0,0-16,0v8.34A96.14,96.14,0,0,0,32.34,120H24a8,8,0,0,0,0,16h8.34A96.14,96.14,0,0,0,120,223.66V232a8,8,0,0,0,16,0v-8.34A96.14,96.14,0,0,0,223.66,136H232a8,8,0,0,0,0-16Zm-32,16h7.6A80.15,80.15,0,0,1,136,207.6V200a8,8,0,0,0-16,0v7.6A80.15,80.15,0,0,1,48.4,136H56a8,8,0,0,0,0-16H48.4A80.15,80.15,0,0,1,120,48.4V56a8,8,0,0,0,16,0V48.4A80.15,80.15,0,0,1,207.6,120H200a8,8,0,0,0,0,16Zm-32-8a40,40,0,1,1-40-40A40,40,0,0,1,168,128Z"/></svg>
          <span id="gps-accuracy-text">--</span>
        </div>
        <button id="btn-hud-toggle" class="icon-btn" title="Toggle HUD Source">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <button id="btn-theme-toggle" class="icon-btn" title="Toggle Light/Dark Mode" aria-label="Toggle theme">
          <!-- Moon icon shown in dark mode; JS swaps to sun in light mode -->
          <svg id="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg id="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </header>

    <!-- Map Container -->
    <div id="map-container">
      <div id="map"></div>

      <!-- Freehand Options Pill -->
      <div id="freehand-options" class="freehand-pill hidden" aria-label="Freehand drawing options"><span class="fh-drag-handle" title="Drag to reposition"></span>
        <div class="fh-geom-group" id="fh-geom-group">
          <button id="fh-btn-line" class="fh-type-btn active">Line</button>
          <button id="fh-btn-polygon" class="fh-type-btn">Polygon</button>
        </div>
        <div class="fh-divider" id="fh-geom-divider"></div>
        <div class="fh-tol-group">
          <label for="fh-tolerance" class="fh-label">Simplify</label>
          <input type="range" id="fh-tolerance" class="fh-slider" min="1" max="50" value="5" step="1">
          <span id="fh-tolerance-val" class="fh-tol-val">5 m</span>
        </div>
      </div>

      <div id="lasso-hud" class="lasso-hud hidden">
        <span id="lasso-count" class="lasso-count">0 selected</span>
        <button id="lasso-delete" class="lasso-action danger">Delete</button>
        <button id="lasso-dismiss" class="lasso-action">✕</button>
      </div>

      <!-- Floating North Arrow -->
      <button id="north-arrow" class="north-arrow-btn" title="Reset North">
        <svg id="north-arrow-svg" viewBox="0 0 24 24" width="72" height="72" xmlns="http://www.w3.org/2000/svg">
          <polygon points="12,2 16,18 12,15 8,18" fill="#ef4444" stroke="none"/>
          <polygon points="12,22 8,6 12,9 16,6" fill="rgba(255,255,255,0.3)" stroke="none"/>
          <text x="12" y="13.5" text-anchor="middle" font-size="5" fill="#fff" font-family="sans-serif" font-weight="bold">N</text>
        </svg>
      </button>

      <!-- Crosshair -->
      <div id="crosshair">
        <div class="ch-h"></div>
        <div class="ch-v"></div>
        <div class="ch-dot"></div>
      </div>

      <!-- Left Toolbar -->
      <nav id="left-toolbar">
        <div class="toolbar-section" data-sec="gps">
          <button class="toolbar-section-label" aria-expanded="true">GPS</button>
          <div class="toolbar-group">
            <button id="btn-gps-point" class="tool-btn active" data-tool="gps-point" title="GPS Single Point">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M128,16a88.1,88.1,0,0,0-88,88c0,31.4,14.51,64.68,42,96.25a254.19,254.19,0,0,0,41.45,38.3,8,8,0,0,0,9.18,0A254.19,254.19,0,0,0,174,200.25c27.45-31.57,42-64.85,42-96.25A88.1,88.1,0,0,0,128,16Zm32,96H136v24a8,8,0,0,1-16,0V112H96a8,8,0,0,1,0-16h24V72a8,8,0,0,1,16,0V96h24a8,8,0,0,1,0,16Z"/></svg>

              <span class="tool-btn-label">Stream</span>
            </button>
            <button id="btn-gps-line" class="tool-btn" data-tool="gps-line" title="GPS Line (toggle on/off to complete)">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M235.81,75.79A27.91,27.91,0,0,1,216,84a28.49,28.49,0,0,1-5.67-.58l-30.57,56.77,0,0a28,28,0,1,1-44.43,6.49l-26.06-26.06A28.07,28.07,0,0,1,96,124a28.41,28.41,0,0,1-5.67-.58L59.76,180.18l0,0a28,28,0,1,1-39.6,0h0a28,28,0,0,1,25.47-7.61l30.57-56.77,0,0a28.05,28.05,0,0,1,0-39.61h0a28,28,0,0,1,44.43,33.12l26.06,26.06a28.1,28.1,0,0,1,19-2.77l30.57-56.77,0,0a28,28,0,0,1,0-39.6h0a28,28,0,0,1,39.6,39.6Z"/></svg>

            </button>
            <button id="btn-gps-polygon" class="tool-btn" data-tool="gps-polygon" title="GPS Polygon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M227.81,52.19a28,28,0,0,0-39.6,0h0a28.14,28.14,0,0,0-4,5L148,47.33A28,28,0,0,0,100.2,28.19h0A28,28,0,0,0,94.7,60L54.58,96.1a28,28,0,0,0-34.39,4.1h0a28,28,0,0,0,36.7,42.12l76.75,56.28a28,28,0,1,0,46.17-10.39,27.66,27.66,0,0,0-3.33-2.84L206.63,100q.69,0,1.38,0a28,28,0,0,0,19.8-47.79ZM161.39,180.05a28,28,0,0,0-18.29,5.64L66.36,129.41A28.15,28.15,0,0,0,65.29,108l40.12-36.11a28,28,0,0,0,38.37-9.12L180,72.66a27.88,27.88,0,0,0,8.17,19.13,28.61,28.61,0,0,0,3.32,2.85Z"/></svg>

            </button>
          </div>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-section collapsed" data-sec="sketch">
          <button class="toolbar-section-label" aria-expanded="false">SKETCH</button>
          <div class="toolbar-group">
            <button id="btn-sketch-point" class="tool-btn" data-tool="sketch-point" title="Sketch Point">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.97 9.304A8 8 0 0 0 2 10c0 4.69 4.887 9.562 7.022 11.468"/><path d="M21.378 16.626a1 1 0 0 0-3.004-3.004l-4.01 4.012a2 2 0 0 0-.506.854l-.837 2.87a.5.5 0 0 0 .62.62l2.87-.837a2 2 0 0 0 .854-.506z"/><circle cx="10" cy="10" r="3"/></svg>

              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M211.81,83.79a28,28,0,0,1-33.12,4.83L88.62,178.69a28,28,0,1,1-44.43-6.48h0a28,28,0,0,1,33.12-4.83l90.07-90.07a28,28,0,1,1,44.43,6.48Z"/></svg>

        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-section collapsed" data-sec="edit">
          <button class="toolbar-section-label" aria-expanded="false">EDIT</button>
          <div class="toolbar-group">

              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" width="18" height="18"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm-4,48a12,12,0,1,1-12,12A12,12,0,0,1,124,72Zm12,112a16,16,0,0,1-16-16V128a8,8,0,0,1,0-16,16,16,0,0,1,16,16v40a8,8,0,0,1,0,16Z"/></svg>

          </button>
          <button id="btn-capture-stop" class="capture-btn danger" title="Stop / Discard" disabled>
            <svg viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16"/></svg>
          </button>
          <div id="capture-stats">
            <span id="capture-points">0 pts</span>
            <span id="capture-distance">0 m</span>
          </div>
        </div>
      </div>

    </div>

    <!-- Panels (hidden by default) -->
    <div id="settings-panel" class="side-panel" style="display:none"></div>
    <div id="import-panel" class="side-panel" style="display:none"></div>
    <div id="export-panel" class="side-panel" style="display:none"></div>
    <div id="cache-panel" class="side-panel" style="display:none"></div>
    <div id="project-panel" class="side-panel" style="display:none"></div>
    <!-- Feature List Modal -->
    <div id="feature-list-overlay" class="fl-modal-overlay" style="display:none">
      <div id="feature-list-panel" class="fl-modal-card">
        <div class="fl-modal-header">
          <span class="fl-modal-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M3 6h18M3 12h18M3 18h18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </span>
          <h3 id="fl-panel-title">Field Data</h3>
          <button class="fl-modal-close" id="fl-close" title="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="fl-body" id="fl-body"></div>
      </div>
    </div>

    <div id="basemap-panel" class="floating-panel" style="display:none"></div>
    <div id="feature-editor-panel" class="floating-panel" style="display:none"></div>
    <div id="stats-panel" class="floating-panel stats-panel" style="display:none"></div>

    <!-- Toast notifications -->
    <div id="toast-container"></div>

    <!-- Modal overlay -->
    <div id="modal-overlay" style="display:none">
      <div id="modal-content"></div>
    </div>

    <!-- Data Library Modal -->
    <div id="data-library-overlay" style="display:none"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
