<!DOCTYPE html>
<html lang="en">
<head>
  <!-- build: redeploy 2026-06-13 (re-trigger Cloudflare deploy for PR #199 changes) -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a3a2a" />
  <meta name="description" content="Offline-first GPS Data Collector for Environmental Fieldwork" />
  <!-- PWA / iOS -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FieldMapper" />
  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
  <link rel="manifest" href="./manifest.json" />
  <title>FIELD MAPPER - GPS data collector &amp; GIS tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Lato:wght@300;400;700&family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <!-- Top Header Bar -->
    <header id="header">
      <div id="header-left">
        <button id="btn-settings" class="icon-btn" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div id="branding">
          <img src="/logo.png" id="brand-logo" alt="Fraxinus" />
        </div>
        <button id="btn-project" class="header-project-crumb" title="Open Project Library">
          <span class="app-name">Project:</span>
          <span class="header-crumb-sep" id="header-crumb-sep" style="display:none">/</span>
          <span id="header-project-name" class="header-project-name"></span>
          <span class="header-crumb-sep" id="header-map-sep" style="display:none">/</span>
          <span id="header-map-name" class="header-map-name"></span>
        </button>
      </div>
      <div id="header-right">
        <div id="header-user-avatar" class="header-avatar" title="" style="display:none"></div>
        <button id="btn-theme-toggle" class="icon-btn" title="Toggle Light/Dark Mode" aria-label="Toggle theme">
          <!-- Moon icon shown in dark mode; JS swaps to sun in light mode -->
          <svg id="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg id="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </header>

    <!-- Secondary Header — coordinate HUD + GPS badge -->
    <div id="sub-header">
      <div id="hud-coords">
        <div id="hud-latlon">---, ---</div>
        <div id="hud-utm">---</div>
      </div>
    </div>

    <!-- Map Container -->
    <div id="map-container">
      <div id="map"></div>

      <!-- Freehand Options Pill -->
      <div id="freehand-options" class="freehand-pill hidden" aria-label="Freehand drawing options"><span class="fh-drag-handle" title="Drag to reposition"></span>
        <div class="fh-geom-group" id="fh-geom-group">
          <button id="fh-btn-line" class="fh-type-btn active">Line</button>
          <button id="fh-btn-polygon" class="fh-type-btn">Polygon</button>
        </div>
        <div class="fh-divider" id="fh-geom-divider"></div>
        <div class="fh-tol-group">
          <label for="fh-tolerance" class="fh-label">Simplify</label>
          <input type="range" id="fh-tolerance" class="fh-slider" min="1" max="50" value="5" step="1">
          <span id="fh-tolerance-val" class="fh-tol-val">5 m</span>
        </div>
      </div>

      <!-- Shape drawing options pill (single consolidated control bar) -->
      <div id="shape-options" class="freehand-pill hidden" aria-label="Shape options"><span class="fh-drag-handle" title="Drag to reposition"></span>
        <select id="sh-kind" class="anno-select" title="Shape">
          <option value="circle">● Circle</option>
          <option value="ellipse">⬭ Ellipse</option>
          <option value="rectangle">▭ Rectangle</option>
          <option value="square">▢ Square</option>
          <option value="ngon">⬡ N-gon</option>
          <option value="arc">◜ Arc</option>
          <option value="bezier">∿ Bézier</option>
          <option value="buffer">◎ Buffer</option>
        </select>
        <div class="fh-divider"></div>
        <div class="fh-geom-group">
          <button id="sh-method-drag" class="fh-type-btn active">Drag</button>
          <button id="sh-method-param" class="fh-type-btn">By value</button>
        </div>
        <div class="fh-divider"></div>
        <div class="fh-geom-group">
          <button id="sh-target-data" class="fh-type-btn active" title="Save as project data">Data</button>
          <button id="sh-target-anno" class="fh-type-btn" title="Save onto the Annotations layer">Annotation</button>
        </div>
        <div class="fh-divider" id="sh-type-divider"></div>
        <label class="sh-field" id="sh-type-field"><span>Type</span>
          <select id="sh-type" class="anno-select" title="Preset type for created shapes"></select>
        </label>
        <div class="fh-divider"></div>
        <div class="sh-params" id="sh-params">
          <label class="sh-field" data-for="radius"><span>Radius</span><input type="number" id="sh-radius" value="50" min="1" step="1"><i>m</i></label>
          <label class="sh-field" data-for="major"><span>Major</span><input type="number" id="sh-major" value="80" min="1" step="1"><i>m</i></label>
          <label class="sh-field" data-for="minor"><span>Minor</span><input type="number" id="sh-minor" value="40" min="1" step="1"><i>m</i></label>
          <label class="sh-field" data-for="width"><span>Width</span><input type="number" id="sh-width" value="100" min="1" step="1"><i>m</i></label>
          <label class="sh-field" data-for="height"><span>Height</span><input type="number" id="sh-height" value="60" min="1" step="1"><i>m</i></label>
          <label class="sh-field" data-for="sides"><span>Sides</span><input type="number" id="sh-sides" value="6" min="3" step="1"><i>#</i></label>
          <label class="sh-field" data-for="buffer"><span>Buffer</span><input type="number" id="sh-buffer" value="25" min="1" step="1"><i>m</i></label>
          <label class="sh-field" data-for="rotation"><span>Rotate</span><input type="number" id="sh-rotation" value="0" step="5"><i>°</i></label>
          <label class="sh-field" data-for="start"><span>Start</span><input type="number" id="sh-start-angle" value="0" step="5"><i>°</i></label>
          <label class="sh-field" data-for="end"><span>End</span><input type="number" id="sh-end-angle" value="180" step="5"><i>°</i></label>
        </div>
        <div class="fh-divider"></div>
        <div class="fh-tol-group">
          <label for="sh-segments" class="fh-label">Detail</label>
          <input type="range" id="sh-segments" class="fh-slider" min="8" max="128" value="64" step="4">
          <span id="sh-segments-val" class="fh-tol-val">64</span>
        </div>
        <div class="fh-divider"></div>
        <button id="sh-stop" class="fh-stop-btn" title="Stop drawing shapes">✕ Done</button>
      </div>

      <!-- Annotation options pill -->
      <div id="annotation-options" class="freehand-pill hidden" aria-label="Annotation options"><span class="fh-drag-handle" title="Drag to reposition"></span>
        <div class="fh-geom-group">
          <button id="an-mode-place" class="fh-type-btn active" title="Place new annotations">Place</button>
          <button id="an-mode-edit" class="fh-type-btn" title="Select &amp; edit placed annotations">Edit</button>
        </div>
        <div class="fh-divider"></div>
        <div id="an-place-group" class="fh-geom-group" style="gap:8px;align-items:center">
          <select id="anno-kind" class="anno-select" title="Annotation type">
            <option value="text">Text</option>
            <option value="arrow">Arrow</option>
            <option value="callout">Callout</option>
          </select>
          <input type="text" id="anno-text" class="anno-text" placeholder="Annotation text…">
          <input type="color" id="anno-color" class="anno-color" value="#ffd400" title="Colour">
          <div class="fh-tol-group">
            <label for="anno-size" class="fh-label">Size</label>
            <input type="range" id="anno-size" class="fh-slider" min="8" max="48" value="16" step="1">
            <span id="anno-size-val" class="fh-tol-val">16</span>
          </div>
        </div>
        <span id="an-edit-hint" class="fh-label" style="display:none">Tap an annotation to edit it</span>
        <div class="fh-divider"></div>
        <button id="an-stop" class="fh-stop-btn" title="Stop annotating">✕ Done</button>
      </div>

      <!-- Annotation editor pill (shown when an annotation is selected in Edit mode) -->
      <div id="annotation-editor" class="freehand-pill hidden" aria-label="Annotation editor"><span class="fh-drag-handle" title="Drag to reposition"></span>
        <span class="fh-label" id="an-edit-kind">Annotation</span>
        <div class="fh-divider"></div>
        <div class="fh-tol-group">
          <label for="an-size-edit" class="fh-label">Scale</label>
          <input type="range" id="an-size-edit" class="fh-slider" min="4" max="120" value="16" step="1">
          <span id="an-size-edit-val" class="fh-tol-val">16</span>
        </div>
        <input type="color" id="an-color-edit" class="anno-color" value="#ffd400" title="Colour">
        <div class="fh-divider"></div>
        <button id="an-delete" class="fh-stop-btn fh-danger-btn" title="Delete annotation">🗑 Delete</button>
        <button id="an-deselect" class="fh-type-btn" title="Done editing">Done</button>
      </div>

      <div id="lasso-hud" class="lasso-hud hidden">
        <span id="lasso-count" class="lasso-count">0 selected</span>
        <button id="lasso-edit-attrs" class="lasso-action" title="View/edit attributes">Attributes</button>
        <button id="lasso-export" class="lasso-action" title="Export selected as GeoJSON">Export</button>
        <button id="lasso-move" class="lasso-action" title="Move selected to another project">Move…</button>
        <button id="lasso-zoom" class="lasso-action" title="Zoom map to selection">Zoom</button>
        <button id="lasso-delete" class="lasso-action danger" title="Delete all selected">Delete</button>
        <button id="lasso-dismiss" class="lasso-action" title="Clear selection">✕</button>
      </div>

      <!-- Crosshair -->
      <div id="crosshair">
        <div class="ch-h"></div>
        <div class="ch-v"></div>
        <div class="ch-dot"></div>
      </div>

      <!-- Left Toolbar -->
      <nav id="left-toolbar">
        <button id="btn-collapse-left" class="left-collapse-btn" title="Collapse toolbar" aria-label="Collapse left toolbar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div id="left-toolbar-body">
        <button id="btn-legend" class="toolbar-section-label legend-pill" data-sec="legend" title="Map Legend" aria-expanded="false">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" width="14" height="14" style="flex-shrink:0"><path d="M224,48H32a8,8,0,0,0-8,8V200a8,8,0,0,0,8,8H224a8,8,0,0,0,8-8V56A8,8,0,0,0,224,48ZM72,184a16,16,0,1,1,16-16A16,16,0,0,1,72,184Zm0-48a16,16,0,1,1,16-16A16,16,0,0,1,72,136Zm0-48A16,16,0,1,1,88,72,16,16,0,0,1,72,88Zm128,96H120a8,8,0,0,1,0-16h80a8,8,0,0,1,0,16Zm0-48H120a8,8,0,0,1,0-16h80a8,8,0,0,1,0,16Zm0-48H120a8,8,0,0,1,0-16h80a8,8,0,0,1,0,16Z"/></svg>
          <span class="legend-pill-text">Legend</span>
        </button>
        <div class="toolbar-separator"></div>
        <div class="toolbar-section" data-sec="gps">
          <button class="toolbar-section-label" aria-expanded="true">GPS</button>
          <div class="toolbar-group">
            <button id="btn-gps-point" class="tool-btn" data-tool="gps-point" title="GPS Single Point">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M128,16a88.1,88.1,0,0,0-88,88c0,31.4,14.51,64.68,42,96.25a254.19,254.19,0,0,0,41.45,38.3,8,8,0,0,0,9.18,0A254.19,254.19,0,0,0,174,200.25c27.45-31.57,42-64.85,42-96.25A88.1,88.1,0,0,0,128,16Zm32,96H136v24a8,8,0,0,1-16,0V112H96a8,8,0,0,1,0-16h24V72a8,8,0,0,1,16,0V96h24a8,8,0,0,1,0,16Z"/></svg>
              <span class="tool-btn-label">Point</span>
            </button>
            <button id="btn-gps-point-stream" class="tool-btn" data-tool="gps-point-stream" title="GPS Stream Points (toggle on/off)">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M208,32H48A16,16,0,0,0,32,48V208a16,16,0,0,0,16,16H208a16,16,0,0,0,16-16V48A16,16,0,0,0,208,32ZM76,192a12,12,0,1,1,12-12A12,12,0,0,1,76,192Zm0-52a12,12,0,1,1,12-12A12,12,0,0,1,76,140Zm0-52A12,12,0,1,1,88,76,12,12,0,0,1,76,88Zm52,104a12,12,0,1,1,12-12A12,12,0,0,1,128,192Zm0-52a12,12,0,1,1,12-12A12,12,0,0,1,128,140Zm0-52a12,12,0,1,1,12-12A12,12,0,0,1,128,88Zm52,104a12,12,0,1,1,12-12A12,12,0,0,1,180,192Zm0-52a12,12,0,1,1,12-12A12,12,0,0,1,180,140Zm0-52a12,12,0,1,1,12-12A12,12,0,0,1,180,88Z"/></svg>
              <span class="tool-btn-label">Stream</span>
            </button>
            <button id="btn-gps-line" class="tool-btn" data-tool="gps-line" title="GPS Line (toggle on/off to complete)">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M235.81,75.79A27.91,27.91,0,0,1,216,84a28.49,28.49,0,0,1-5.67-.58l-30.57,56.77,0,0a28,28,0,1,1-44.43,6.49l-26.06-26.06A28.07,28.07,0,0,1,96,124a28.41,28.41,0,0,1-5.67-.58L59.76,180.18l0,0a28,28,0,1,1-39.6,0h0a28,28,0,0,1,25.47-7.61l30.57-56.77,0,0a28.05,28.05,0,0,1,0-39.61h0a28,28,0,0,1,44.43,33.12l26.06,26.06a28.1,28.1,0,0,1,19-2.77l30.57-56.77,0,0a28,28,0,0,1,0-39.6h0a28,28,0,0,1,39.6,39.6Z"/></svg>
              <span class="tool-btn-label">Line</span>
            </button>
            <button id="btn-gps-polygon" class="tool-btn" data-tool="gps-polygon" title="GPS Polygon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M227.81,52.19a28,28,0,0,0-39.6,0h0a28.14,28.14,0,0,0-4,5L148,47.33A28,28,0,0,0,100.2,28.19h0A28,28,0,0,0,94.7,60L54.58,96.1a28,28,0,0,0-34.39,4.1h0a28,28,0,0,0,36.7,42.12l76.75,56.28a28,28,0,1,0,46.17-10.39,27.66,27.66,0,0,0-3.33-2.84L206.63,100q.69,0,1.38,0a28,28,0,0,0,19.8-47.79ZM161.39,180.05a28,28,0,0,0-18.29,5.64L66.36,129.41A28.15,28.15,0,0,0,65.29,108l40.12-36.11a28,28,0,0,0,38.37-9.12L180,72.66a27.88,27.88,0,0,0,8.17,19.13,28.61,28.61,0,0,0,3.32,2.85Z"/></svg>
              <span class="tool-btn-label">Polygon</span>
            </button>
          </div>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-section collapsed" data-sec="wetlands">
          <button class="toolbar-section-label" aria-expanded="false">WETLANDS</button>
          <div class="toolbar-group">
            <button id="btn-wetlands-add-plot" class="tool-btn" title="Add Wetland Plot — drop a plot here and open the delineation form">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" width="18" height="18"><path d="M247.63,39.84a8,8,0,0,0-7.47-7.47c-49-3-89.43,11-110.93,38.47-15.16,19.38-19.38,43.1-12.13,66.7l-29.5,29.5a4,4,0,0,0,0,5.66l5.65,5.65a4,4,0,0,0,5.66,0l27.07-27.07c8.74,2.74,17.65,4.13,26.41,4.13a83.86,83.86,0,0,0,38.65-9.3c.39-.2.78-.41,1.16-.62C219.58,129.4,233.5,89,236.5,40h0Q242.07,40.12,247.63,39.84ZM62.16,166.16a8,8,0,0,0-11.32,0C24.45,192.55,24,231.94,24,233.6a8,8,0,0,0,8,8c1.66,0,41.05-.45,67.44-26.84a8,8,0,0,0,0-11.32Z"/></svg>
              <span class="tool-btn-label">Add Plot</span>
            </button>
            <button id="btn-wetlands-edit-plot" class="tool-btn" title="Edit Plot — browse and edit all submitted wetland plots">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" width="18" height="18"><path d="M222.14,58.87A8,8,0,0,0,216,56H54.68L49.79,42.59A16,16,0,0,0,34.7,32H16a8,8,0,0,0,0,16H34.7l36.89,101.41a16,16,0,0,0,15,10.59H188a16,16,0,0,0,15.07-10.67l24.49-69A8,8,0,0,0,222.14,58.87ZM188,144H86.59L62.41,72H204.6ZM96,200a16,16,0,1,1-16-16A16,16,0,0,1,96,200Zm104,0a16,16,0,1,1-16-16A16,16,0,0,1,200,200Z"/></svg>
              <span class="tool-btn-label">Edit Plot</span>
            </button>
            <button id="btn-wetlands-report" class="tool-btn" title="Wetland Plot Report (PDF) — generate the delineation report for a plot">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" width="18" height="18"><path d="M213.66,82.34l-56-56A8,8,0,0,0,152,24H56A16,16,0,0,0,40,40V216a16,16,0,0,0,16,16H200a16,16,0,0,0,16-16V88A8,8,0,0,0,213.66,82.34ZM160,51.31,188.69,80H160ZM200,216H56V40h88V88a8,8,0,0,0,8,8h48V216ZM176,152a8,8,0,0,1-8,8H88a8,8,0,0,1,0-16h80A8,8,0,0,1,176,152Zm0,32a8,8,0,0,1-8,8H88a8,8,0,0,1,0-16h80A8,8,0,0,1,176,184Z"/></svg>
              <span class="tool-btn-label">Report</span>
            </button>
          </div>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-section collapsed" data-sec="inventory">
          <button class="toolbar-section-label" aria-expanded="false">INVENTORY</button>
          <div class="toolbar-group">
            <button id="btn-inventory-new" class="tool-btn" title="New Survey — start a timed biodiversity inventory survey">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" width="18" height="18"><path d="M184,72H40A16,16,0,0,0,24,88V200a16,16,0,0,0,16,16H184a16,16,0,0,0,16-16V88A16,16,0,0,0,184,72Zm0,128H40V88H184V200ZM232,56V176a8,8,0,0,1-16,0V56H64a8,8,0,0,1,0-16H216A16,16,0,0,1,232,56ZM128,112a8,8,0,0,1,8,8v16h16a8,8,0,0,1,0,16H136v16a8,8,0,0,1-16,0V152H104a8,8,0,0,1,0-16h16V120A8,8,0,0,1,128,112Z"/></svg>
              <span class="tool-btn-label">New Survey</span>

    <!-- Panels (hidden by default) -->
    <div id="settings-panel" class="side-panel" style="display:none"></div>
    <div id="import-panel" class="side-panel" style="display:none"></div>
    <div id="export-panel" class="side-panel" style="display:none"></div>
    <div id="cache-panel" class="side-panel" style="display:none"></div>
    <div id="photo-capture-panel" class="side-panel" style="display:none"></div>
    <div id="photo-report-panel" class="side-panel" style="display:none"></div>
    <div id="project-panel" class="project-dropdown" style="display:none"></div>
    <div id="project-library-overlay" class="pl-overlay" style="display:none"></div>
    <div id="master-data-panel" class="side-panel" style="display:none"></div>
    <!-- Feature List Modal -->
    <div id="feature-list-overlay" class="fl-modal-overlay" style="display:none">
      <div id="feature-list-panel" class="fl-modal-card">
        <div class="fl-modal-header">
          <span class="fl-modal-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M3 6h18M3 12h18M3 18h18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </span>
          <h3 id="fl-panel-title">Field Data</h3>
          <button class="fl-modal-close" id="fl-close" title="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="fl-body" id="fl-body"></div>
      </div>
    </div>

    <div id="basemap-panel" class="floating-panel" style="display:none"></div>
    <div id="feature-editor-panel" class="floating-panel" style="display:none"></div>

    <!-- Inventory in-progress HUD (collapsible) -->
    <div id="inv-hud" class="inv-hud" style="display:none">
      <div class="inv-hud-header">
        <span class="inv-hud-title">INVENTORY</span>
        <span id="inv-hud-timer" class="inv-hud-timer">00:00:00</span>
        <button id="inv-hud-collapse" class="inv-hud-collapse" title="Collapse / expand" aria-label="Collapse">▾</button>
      </div>
      <div class="inv-hud-body">
        <div id="inv-hud-stats" class="inv-hud-stats">
          <div class="inv-stat"><strong id="inv-stat-unique">0</strong><span>Species</span></div>
          <div class="inv-stat"><strong id="inv-stat-total">0</strong><span>Obs</span></div>
          <div class="inv-stat"><strong id="inv-stat-soci-sp">0 spp</strong><span>SoCI</span></div>
          <div class="inv-stat"><strong id="inv-stat-since">—</strong><span>Since last</span></div>
        </div>
        <canvas id="inv-species-curve" class="inv-species-curve"></canvas>
        <div class="inv-obs-list-header">
          <span>Observations</span>
          <button id="inv-hud-sort" class="inv-hud-sort" title="Change sort order">NEW→OLD</button>
        </div>
        <div id="inv-obs-empty" class="inv-obs-empty">No observations yet — tap “Add Obs”.</div>
        <div id="inv-obs-list" class="inv-obs-list"></div>
      </div>
      <div class="inv-hud-footer">
        <button id="inv-hud-add" class="btn-primary btn-sm">+ Add Obs</button>
        <button id="inv-hud-pause" class="btn-outline btn-sm">⏸ Pause</button>
        <button id="inv-hud-savedraft" class="btn-outline btn-sm">Save Draft</button>
        <button id="inv-hud-submit" class="btn-primary btn-sm">Submit</button>
      </div>
    </div>
    <div id="stats-panel" class="floating-panel stats-panel" style="display:none"></div>

    <!-- Toast notifications -->
    <div id="toast-container"></div>

    <!-- Modal overlay -->
    <div id="modal-overlay" style="display:none">
      <div id="modal-content"></div>
    </div>

    <!-- Data Library Modal -->
    <div id="data-library-overlay" style="display:none"></div>
  </div>

  <!-- Inventory species databases (vertebrates/vascular/nonvascular eager; invertebrates lazy-loaded). -->
  <script src="./db/db-vertebrates.js"></script>
  <script src="./db/db-vascular.js"></script>
  <script src="./db/db-nonvascular.js"></script>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
