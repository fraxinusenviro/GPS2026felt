<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Green corner fills (top-right and bottom-left) matching the logo -->
  <polygon points="512,0 512,180 332,0" fill="#2d6a2d"/>
  <polygon points="0,512 180,512 0,332" fill="#2d6a2d"/>

  <!-- Black circle border -->
  <circle cx="256" cy="256" r="242" fill="#111111"/>

  <!-- White interior circle -->
  <circle cx="256" cy="256" r="210" fill="#ffffff"/>

  <!-- Fraxinus compound leaf (pinnate, stem running lower-right to upper-left) -->
  <!-- Central stem -->
  <path d="M308 362 Q262 260 182 152" stroke="#2d6a2d" stroke-width="13" stroke-linecap="round" fill="none"/>

  <!-- Leaflet pair 1 (bottom) -->
  <ellipse cx="272" cy="350" rx="38" ry="17" transform="rotate(-42 272 350)" fill="#2d6a2d"/>
  <ellipse cx="312" cy="339" rx="38" ry="17" transform="rotate(14 312 339)" fill="#2d6a2d"/>

  <!-- Leaflet pair 2 -->
  <ellipse cx="250" cy="308" rx="42" ry="18" transform="rotate(-50 250 308)" fill="#2d6a2d"/>
  <ellipse cx="294" cy="294" rx="42" ry="18" transform="rotate(10 294 294)" fill="#2d6a2d"/>

  <!-- Leaflet pair 3 -->
  <ellipse cx="228" cy="264" rx="44" ry="19" transform="rotate(-56 228 264)" fill="#2d6a2d"/>
  <ellipse cx="275" cy="248" rx="44" ry="19" transform="rotate(7 275 248)" fill="#2d6a2d"/>

  <!-- Leaflet pair 4 -->
  <ellipse cx="208" cy="222" rx="43" ry="18" transform="rotate(-60 208 222)" fill="#2d6a2d"/>
  <ellipse cx="254" cy="205" rx="43" ry="18" transform="rotate(5 254 205)" fill="#2d6a2d"/>

  <!-- Leaflet pair 5 (upper) -->
  <ellipse cx="191" cy="181" rx="39" ry="17" transform="rotate(-63 191 181)" fill="#2d6a2d"/>
  <ellipse cx="234" cy="164" rx="39" ry="17" transform="rotate(3 234 164)" fill="#2d6a2d"/>

  <!-- Terminal leaflet -->
  <ellipse cx="185" cy="150" rx="29" ry="14" transform="rotate(-66 185 150)" fill="#2d6a2d"/>
</svg>
