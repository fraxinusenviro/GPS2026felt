<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="8" fill="#111a14"/>
  <!-- Green corner fills (triangular) -->
  <path d="M0,0 L20,0 L0,20 Z" fill="#2d6a2d"/>
  <path d="M64,0 L44,0 L64,20 Z" fill="#2d6a2d"/>
  <path d="M0,64 L20,64 L0,44 Z" fill="#2d6a2d"/>
  <path d="M64,64 L44,64 L64,44 Z" fill="#2d6a2d"/>
  <!-- Black circle ring -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#1a1a1a" stroke-width="4"/>
  <!-- Fraxinus compound leaf: central rachis -->
  <line x1="32" y1="50" x2="32" y2="15" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Terminal leaflet (apex) -->
  <ellipse cx="32" cy="13.5" rx="3" ry="5" fill="#4ade80"/>
  <!-- Upper lateral pair -->
  <ellipse cx="25.5" cy="21" rx="4.5" ry="2" fill="#4ade80" transform="rotate(-35,25.5,21)"/>
  <ellipse cx="38.5" cy="21" rx="4.5" ry="2" fill="#4ade80" transform="rotate(35,38.5,21)"/>
  <!-- Mid lateral pair -->
  <ellipse cx="23.5" cy="29" rx="5" ry="2.2" fill="#4ade80" transform="rotate(-20,23.5,29)"/>
  <ellipse cx="40.5" cy="29" rx="5" ry="2.2" fill="#4ade80" transform="rotate(20,40.5,29)"/>
  <!-- Lower lateral pair -->
  <ellipse cx="25" cy="37" rx="4.5" ry="2" fill="#4ade80" transform="rotate(-10,25,37)"/>
  <ellipse cx="39" cy="37" rx="4.5" ry="2" fill="#4ade80" transform="rotate(10,39,37)"/>
</svg>
