<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Green corner fills: bottom-left and top-right only -->
  <path d="M0,200 L0,148 L52,200 Z" fill="#2d6a2d"/>
  <path d="M200,0 L200,52 L148,0 Z" fill="#2d6a2d"/>
  <!-- Circle: white fill, thick black stroke -->
  <circle cx="100" cy="100" r="88" fill="white" stroke="black" stroke-width="10"/>
  <!-- Fraxinus compound leaf: rachis from lower-left to upper-right -->
  <!-- Central rachis -->
  <line x1="68" y1="158" x2="122" y2="42" stroke="#2d6a2d" stroke-width="3" stroke-linecap="round"/>
  <!-- Terminal leaflet (apex) -->
  <ellipse cx="124" cy="38" rx="9" ry="14" fill="#2d6a2d" transform="rotate(-30,124,38)"/>
  <!-- Pair 1 (near top) -->
  <ellipse cx="113" cy="57" rx="16" ry="7" fill="#2d6a2d" transform="rotate(-55,113,57)"/>
  <ellipse cx="105" cy="53" rx="16" ry="7" fill="#2d6a2d" transform="rotate(10,105,53)"/>
  <!-- Pair 2 -->
  <ellipse cx="104" cy="76" rx="20" ry="8" fill="#2d6a2d" transform="rotate(-50,104,76)"/>
  <ellipse cx="91" cy="72" rx="20" ry="8" fill="#2d6a2d" transform="rotate(12,91,72)"/>
  <!-- Pair 3 (middle) -->
  <ellipse cx="96" cy="97" rx="22" ry="9" fill="#2d6a2d" transform="rotate(-45,96,97)"/>
  <ellipse cx="80" cy="92" rx="22" ry="9" fill="#2d6a2d" transform="rotate(15,80,92)"/>
  <!-- Pair 4 -->
  <ellipse cx="87" cy="118" rx="23" ry="9" fill="#2d6a2d" transform="rotate(-40,87,118)"/>
  <ellipse cx="70" cy="113" rx="23" ry="9" fill="#2d6a2d" transform="rotate(18,70,113)"/>
  <!-- Pair 5 (near base, large) -->
  <ellipse cx="78" cy="140" rx="22" ry="9" fill="#2d6a2d" transform="rotate(-35,78,140)"/>
  <ellipse cx="62" cy="134" rx="22" ry="9" fill="#2d6a2d" transform="rotate(22,62,134)"/>
</svg>
