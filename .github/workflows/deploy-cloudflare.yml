name: Deploy fieldmapper Worker to Cloudflare

# Builds the PWA and deploys the single-origin `fieldmapper` Worker (PWA + sync
# API) to Cloudflare. Runs on push to the default branch, or on demand.
#
# Prerequisites (one-time — see cloud/ACCESS.md):
#   - Resources created once: `wrangler r2 bucket create ffm-blobs`,
#     `wrangler d1 create ffm` (paste database_id into cloud/wrangler.toml),
#     and Worker secrets set (`wrangler secret put R2_ACCESS_KEY_ID` etc.).
#   - GitHub repo secrets (Settings → Secrets and variables → Actions):
#       CLOUDFLARE_API_TOKEN  — token with Account: Workers Scripts:Edit,
#                               D1:Edit, Workers R2 Storage:Edit, Account
#                               Settings:Read.
#       CLOUDFLARE_ACCOUNT_ID — your Cloudflare account id.

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

# Avoid overlapping deploys.
concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Build the PWA → ./dist (served by the Worker via Static Assets).
      - name: Install (root) and build PWA
        run: |
          npm ci
          npm run build

      # Apply D1 migrations, then deploy the Worker (which bundles ../dist).
      - name: Migrate D1 and deploy Worker
        working-directory: cloud
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm ci
          npx wrangler d1 migrations apply ffm --remote
          npx wrangler deploy
